<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .product-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .product-card h3 { margin: 0 0 5px; }
        .product-card p { margin: 5px 0; }
        .delete-btn { background-color: #ff4d4f; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .delete-btn:hover { background-color: #ff7875; }
    </style>
</head>
<body>
    <h1>Products</h1>
    <div id="products">
        {% for product in products %}
        <div class="product-card">
            <h3>{{ product.name }}</h3>
            <p>{{ product.description }}</p>
            <p>{{ product.price }}$</p>
            <form method="POST" action="{% url 'delete_product' product.id %}">
                {% csrf_token %}
                <button type="submit" class="delete-btn">Delete</button>
            </form>
        </div>
        {% empty %}
        <p>No products available.</p>
        {% endfor %}
    </div>
</body>
</html>
